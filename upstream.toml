# ============================================================================
#  InHive core — реестр вендоренного кода и его апстрим-эталонов
# ============================================================================
#
#  ЗАЧЕМ ЭТОТ ФАЙЛ СУЩЕСТВУЕТ
#  --------------------------
#  2026-07-19 полдня диагностики xhttp/CDN ушло на сравнение с копией Xray,
#  отставшей на 6 релизов (26.1.13 против актуального 26.7.11). Это породило
#  не просто потерю времени, а ЛОЖНЫЙ ФИКС: 26.1.13 дефолтит xmux
#  `maxConcurrency 1..1`, 26.7.11 — `maxConnections 6..6`. Это ПРОТИВОПОЛОЖНЫЕ
#  стратегии (соединение-на-поток = шторм хендшейков vs тёплый пул), и «фикс»
#  по протухшему эталону двигал в сторону нестабильности.
#
#  Корневая проблема была НЕ в конкретном пропуске, а в том, что мы не могли
#  ответить на вопрос «от какой версии апстрима отпочкован вот этот кусок кода».
#  Этот файл отвечает на него для каждого вендоренного куска.
#
#  ПОЧЕМУ TOML, А НЕ MARKDOWN-ТАБЛИЦА И НЕ YAML
#  --------------------------------------------
#  * Не Markdown: таблица, которую надо парсить регулярками, — это второй
#    источник правды рядом с данными. Ровно тот класс дрейфа, который мы тут
#    и лечим. Человекочитаемую таблицу РЕНДЕРИТ скрипт из этого файла.
#  * Не YAML: PyYAML не входит в stdlib и на машине не установлен (проверено).
#    Реестр читает CI-джоба, которая обязана быть неблокирующей и
#    беззависимостной; `pip install pyyaml` в такой джобе — лишняя точка отказа.
#  * TOML: `tomllib` — stdlib с Python 3.11, ноль зависимостей, и при этом
#    поддерживает комментарии — а «почему мы разошлись с апстримом» обязано
#    лежать рядом с данными, а не в отдельном документе.
#
#  КАК ПОЛЬЗОВАТЬСЯ
#  ----------------
#    python3 core/scripts/check-upstream-drift.py            # сводка + коды возврата
#    python3 core/scripts/check-upstream-drift.py --verbose  # + расхождения по каждой позиции
#
#  ЖЕЛЕЗНОЕ ПРАВИЛО ПЕРЕД ЛЮБЫМ DIFF-АУДИТОМ ПРОТИВ АПСТРИМА:
#  сначала прогнать скрипт, и только потом сравнивать код. Не доверять копиям
#  апстрима, лежащим в scratchpad / ~/Downloads / соседнем клоне — у них нет
#  версии, и именно на этом мы обожглись.
#
#  ПРОДУКТОВЫЙ ИНВАРИАНТ (см. feedback_domain_universal_client.md):
#  InHive — УНИВЕРСАЛЬНЫЙ клиент, обязан переваривать любую чужую подписку.
#  Поэтому реестр покрывает ВЕСЬ вендоренный код, включая протоколы, которыми
#  мы сами не пользуемся. Сузить объём по критерию «нам это не нужно» = ошибка:
#  нужно НАШИМ ЮЗЕРАМ на чужих подписках.
#
#  ПОЛЯ ЗАПИСИ
#  -----------
#   id           — короткий идентификатор
#   kind         — "tree"   : дерево исходников в нашем репо, эталон = тег апстрима
#                  "commit" : дерево исходников, эталон = коммит (у апстрима нет тегов)
#                  "module" : обычная go.mod-зависимость; текущая версия читается
#                             ЖИВЬЁМ из go.mod, поэтому по этой оси реестр
#                             протухнуть не может
#   path         — путь относительно core/ (для tree/commit)
#   upstream     — канонический апстрим-репозиторий
#   ref          — ТОЧНАЯ версия/тег эталона
#   ref_commit   — коммит, на который этот тег обязан резолвиться. Скрипт
#                  сверяет его с сетью: расхождение = перетегированный апстрим
#                  ИЛИ неверно записанный эталон. Это и есть защита от протухания.
#   verified     — дата последней сверки С СЕТЬЮ
#   verified_how — чем именно доказано, что эталон именно этот (не «помню»)
#   owner        — кто ведёт позицию
#   max_lag      — сколько релизов отставания терпим, дальше — ненулевой выход
#   divergences  — НАШИ намеренные расхождения: по строке «что и зачем»
#
# ============================================================================

schema_version = 1

[meta]
default_max_lag = 3
# Дата последней ПОЛНОЙ сверки реестра с сетью.
last_full_audit = "2026-07-19"


