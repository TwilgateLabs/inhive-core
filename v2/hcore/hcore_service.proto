syntax = "proto3";
import "v2/hcommon/common.proto";
package hcore;

option go_package = "github.com/twilgate/inhive-core/v2/hcore";
option java_package = "com.inhive.core.api.v2.hcore";
import "v2/hcore/hcore.proto";

service Core {
  rpc Start (StartRequest) returns (CoreInfoResponse);
  rpc CoreInfoListener (hcommon.Empty) returns (stream CoreInfoResponse);
  rpc OutboundsInfo (hcommon.Empty) returns (stream OutboundGroupList);
  rpc MainOutboundsInfo (hcommon.Empty) returns (stream OutboundGroupList);
  rpc GetSystemInfo (hcommon.Empty) returns (SystemInfo);
  rpc GetSystemInfoStream (hcommon.Empty) returns (stream SystemInfo);
  rpc Setup (SetupRequest) returns (hcommon.Response);
  rpc Parse (ParseRequest) returns (ParseResponse);
  // Wave 13D — see BootstrapFetchRequest in hcore.proto for the full contract.
  rpc BootstrapFetch (BootstrapFetchRequest) returns (BootstrapFetchResponse);
  // Honest per-server ping via a side-instance — see UrlTestConfigRequest in
  // hcore.proto. Works while the VPN is disconnected, no main-box dependency.
  rpc UrlTestConfig (UrlTestConfigRequest) returns (UrlTestConfigResponse);
  // Ping v2 — warm persistent probe-instance. One long-lived side-instance holds
  // all servers' outbounds and is reused across probe cycles. See
  // UrlTestConfigWarmRequest in hcore.proto. Same disconnected moat as UrlTestConfig.
  rpc UrlTestConfigWarm (UrlTestConfigWarmRequest) returns (UrlTestConfigWarmResponse);
  // Tear down a warm probe instance early (server-list screen closed).
  rpc ReleaseWarmProbe (ReleaseWarmProbeRequest) returns (hcommon.Response);
  rpc ChangeInhiveSettings (ChangeInhiveSettingsRequest) returns (CoreInfoResponse);
  //rpc GenerateConfig (GenerateConfigRequest) returns (GenerateConfigResponse);
  rpc StartService (StartRequest) returns (CoreInfoResponse);
  rpc Stop (hcommon.Empty) returns (CoreInfoResponse);
  rpc Restart (StartRequest) returns (CoreInfoResponse);
  rpc SelectOutbound (SelectOutboundRequest) returns (hcommon.Response);
  // Hot-add: добавить outbound в живой box + в селекторы без рестарта
  // (кросс-подписочный dual без реконнекта). См. AddOutboundRequest.
  rpc AddOutbound (AddOutboundRequest) returns (AddOutboundResponse);
  rpc RemoveOutbound (RemoveOutboundRequest) returns (hcommon.Response);
  rpc UrlTest (UrlTestRequest) returns (hcommon.Response);
  rpc UrlTestActive (hcommon.Empty) returns (hcommon.Response);
  // SpeedTest — измеряет download/upload speed через outbound[outbound_tag].
  // Делает HTTP request к speed.cloudflare.com внутри core (NE process)
  // через outbound dialer. Заменяет старый Dart-side approach через mixed
  // proxy port — на iOS (двухпроцессная арх) тот не работал.
  rpc SpeedTest (SpeedTestRequest) returns (SpeedTestResponse);
  rpc GenerateWarpConfig (GenerateWarpConfigRequest) returns (WarpGenerationResponse);
  rpc GetSystemProxyStatus (hcommon.Empty) returns (SystemProxyStatus);
  rpc SetSystemProxyEnabled (SetSystemProxyEnabledRequest) returns (hcommon.Response);
  rpc LogListener (LogRequest) returns (stream LogMessage);
  rpc Close (CloseRequest) returns (hcommon.Empty);
  // Phase 2 — generic mode switching.
  //
  // SwitchMode records the new desired mode + broadcasts an ack event on the
  // ModeStateListener stream. It does NOT itself stop/start the VPN service.
  // Hard cross-mode switching (sing-box ⇄ olcrtc) is the main app's job
  // (restart NE with new providerConfiguration); soft within-mode rotation
  // (urltest carousel inside Mode 1) keeps using the existing Selector path.
  rpc SwitchMode (SwitchModeRequest) returns (hcommon.Response);
  // ModeStateListener streams initial snapshot + incremental events.
  // First emission is always the current mode (no events yet). Subsequent
  // events fire on: SwitchMode RPC, watcher-detected health regression
  // (Mode 1 → recommend Mode 2), and explicit recovery acks.
  rpc ModeStateListener (hcommon.Empty) returns (stream ModeStateResponse);
}


