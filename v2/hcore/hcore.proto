syntax = "proto3";
import "v2/hcommon/common.proto";
import "google/protobuf/timestamp.proto";

package hcore;
option go_package = "github.com/twilgate/inhive-core/v2/hcore";
option java_package = "com.inhive.core.api.v2.hcore";


enum CoreStates {
  STOPPED = 0;
  STARTING = 1;
  STARTED = 2;
  STOPPING = 3;
}

enum MessageType {
  EMPTY=0;
  EMPTY_CONFIGURATION = 1;
  START_COMMAND_SERVER = 2;
  CREATE_SERVICE = 3;
  START_SERVICE = 4;
  UNEXPECTED_ERROR = 5;
  ALREADY_STARTED = 6;
  ALREADY_STOPPED = 7;
  INSTANCE_NOT_FOUND = 8;
  INSTANCE_NOT_STOPPED = 9;
  INSTANCE_NOT_STARTED = 10;
  ERROR_BUILDING_CONFIG = 11;
  ERROR_PARSING_CONFIG = 12;
  ERROR_READING_CONFIG = 13;
  ERROR_EXTENSION = 14;
}

message CoreInfoResponse {
  CoreStates core_state = 1;
  MessageType message_type = 2;
  string message = 3;
}

message StartRequest {
  string config_path = 1;
  string config_content = 2;  // Optional if configPath is not provided.
  bool disable_memory_limit = 3;
  bool delay_start = 4;
  bool enable_old_command_server = 5;
  bool enable_raw_config = 6;
  string config_name = 7; 
}


enum SetupMode {
    OLD = 0;
    GRPC_NORMAL = 1;
    GRPC_BACKGROUND = 2;
    GRPC_NORMAL_INSECURE = 3;
    GRPC_BACKGROUND_INSECURE = 4;
}

message CloseRequest {
  SetupMode mode = 1;
}
// Define the message equivalent of SetupParameters
message SetupRequest {
    string base_path = 1;
    string working_dir = 2;
    string temp_dir = 3;
    int64 flutter_status_port = 4;
    string listen = 5;
    string secret = 6;
    bool debug = 7;
    SetupMode mode = 8;
    bool fix_android_stack = 9;
}

message SystemInfo {
  int64 memory = 1;
  int32 goroutines = 2;
  int32 connections_in = 3;
  int32 connections_out = 4;
  bool traffic_available = 5;
  int64 uplink = 6;
  int64 downlink = 7;
  int64 uplink_total = 8;
  int64 downlink_total = 9;
  string current_outbound = 10;
  string current_profile = 11;
}

message OutboundInfo {
  string tag = 1;
  string type = 2;
  google.protobuf.Timestamp url_test_time = 3;
  int32 url_test_delay = 4;
  optional IpInfo ipinfo = 5;
  bool is_selected = 6;
  bool is_group = 7;
  optional string group_selected_tag=13;
  optional string group_selected_tag_display=14;
  bool is_secure = 8;
  bool is_visible = 9;
  uint32 port = 10;
  string host = 11;
  string tag_display = 12;
  int64 upload = 15;
  int64 download = 16;
  string detour = 17;
}

message IpInfo {
    string ip = 1 [json_name = "ip"];                        // The IP address.
    string country_code = 2 [json_name = "country_code"];    // The country code.
    string region = 3 [json_name = "region"];                // The region (optional).
    string city = 4 [json_name = "city"];                    // The city (optional).
    int32 asn = 5 [json_name = "asn"];                       // The Autonomous System Number (optional).
    string org = 6 [json_name = "org"];                      // The organization (optional).
    double latitude = 7 [json_name = "latitude"];            // The latitude (optional).
    double longitude = 8 [json_name = "longitude"];          // The longitude (optional).
    string postal_code = 9 [json_name = "postal_code"];      // The postal code (optional).
}
message OutboundGroup {
  string tag = 1;
  string type = 2;
  string selected=3;
  bool selectable=4;
  bool Is_expand=5;
  repeated OutboundInfo items = 6;
  
}
message OutboundGroupList{
  repeated OutboundGroup items = 1;
}

message WarpAccount {
  string account_id = 1;
  string access_token = 2;
}

message WarpWireguardConfig {
  string private_key = 1 [json_name = "private-key"];
  string local_address_ipv4 = 2 [json_name = "local-address-ipv4"];
  string local_address_ipv6 = 3 [json_name = "local-address-ipv6"];
  string peer_public_key = 4 [json_name = "peer-public-key"];
  string client_id=5 [json_name = "client-id"];
}

message WarpGenerationResponse {
  WarpAccount account = 1;
  string log = 2;
  WarpWireguardConfig config = 3;
}

message SystemProxyStatus {
  bool available = 1;
  bool enabled = 2;
}

message ParseRequest {
  string content = 1; 
  string config_path = 2; 
  string temp_path = 3; 
  bool debug = 4;
}

message ParseResponse {
  hcommon.ResponseCode response_code = 1;
  string content = 2;
  string message = 3;
}

// Wave 13D — Bootstrap Subscription Fetch.
// Fetches an HTTP resource (subscription URL) through a temporary side-instance
// sing-box configured from `config_json`. The side-instance is brought up with
// TUN/system-proxy/clash disabled and a SOCKS5 inbound on a random localhost port,
// the request is issued through that SOCKS5, then the side-instance is torn down.
// The main VPN (static.StartedService) is not touched.
message BootstrapFetchRequest {
  string config_json = 1;   // sing-box options JSON (e.g. urltest carousel of bootstrap endpoints)
  string url = 2;           // URL to GET
  int32 timeout_ms = 3;     // 0 = default 30000
}

message BootstrapFetchResponse {
  bytes body = 1;           // raw response body
  int32 status_code = 2;    // HTTP status code (0 if request never reached the server)
  string error = 3;         // error text (empty on success); transport is always OK = soft error
  int32 duration_ms = 4;    // total time spent for UI loading state
}

// UrlTestConfig — honest per-server ping. Spins a temporary side-instance from a
// self-contained single-outbound config, runs a real probe THROUGH that outbound,
// measures the RTT, tears down. Does NOT touch the main VPN box (works while the
// VPN is disconnected). Honest for hysteria2/QUIC + reality: a dead/blocked
// outbound fails the probe → Error set, DelayMs 0. Endpoint-based exits
// (wireguard/awg in endpoints[], sing-box 1.13+) are probed the same way — the
// endpoint's own dialer drives the probe.
message UrlTestConfigRequest {
  string config_json = 1;   // self-contained sing-box options JSON for ONE server
  string url = 2;           // probe URL; "" => https://www.gstatic.com/generate_204
  int32 timeout_ms = 3;     // 0 => default 5000
}
message UrlTestConfigResponse {
  int32 delay_ms = 1;       // real RTT through the outbound in ms; 0 on failure
  string error = 2;         // empty on success; transport always OK = soft error
  // true = failure happened on OUR side BEFORE the probe ever ran through the
  // outbound (config parse / side-instance bring-up / tag lookup / panic).
  // The app maps this to "couldn't test" (blank), NOT "server dead" (red x).
  // false with error set = the side-instance came up and the probe itself
  // failed through the outbound → honest tested-dead verdict.
  bool bring_up_failed = 3;
}

// UrlTestConfigWarm — ping v2. Same honesty + disconnected moat as UrlTestConfig,
// but WARM: a single long-lived side-instance holds ALL servers' outbounds and is
// reused across probe cycles (like sing-box's urltest-group reusing detour dialers)
// instead of spinning a fresh cold instance per server per tap. The first probe of a
// cycle pays the instance bring-up; every later probe (this cycle AND the next
// pingAll a few seconds later) rides the already-warm outbounds — killing the
// per-server 8s cold bring-up налог that made us the slowest of the top clients and
// was the root of the ping flake.
//
// Lifecycle: keyed by instance_key (the app passes a stable hash of the current
// server list / subscription). A new key → the config changed → the old warm
// instance is torn down and a fresh one built. An idle instance is reaped after a
// TTL (default ~5 min) so we do not hold a side-instance forever. The app should
// pass the SAME key for repeated pingAll of the same server set to get the reuse.
//
// The probe itself also checks the response status code (expectedStatus 204/200) —
// a hijacked test endpoint returning a bogus 200 body no longer reads as success.
message UrlTestConfigWarmRequest {
  // Full multi-server sing-box options JSON (the app's buildMultiServerConfig
  // output — selector + all server outbounds + direct/block, or endpoints[] for
  // wireguard/awg). Only used when the warm instance for instance_key is absent
  // or stale; on a cache hit the running instance is reused and this is ignored.
  string config_json = 1;
  // Outbound/endpoint tags to probe THIS call (a subset of the config's exits).
  // Empty => probe every non-group exit the config exposes.
  repeated string tags = 2;
  string url = 3;            // probe URL; "" => https://www.gstatic.com/generate_204
  int32 timeout_ms = 4;      // per-tag probe budget; 0 => default 5000
  // Stable identity of the server set. Same key => reuse the warm instance.
  // Changing it (subscription / server-list change) rebuilds the instance.
  string instance_key = 5;
  // 0 => expect 204 or 200 (generate_204 friendly). Set explicitly to require an
  // exact status. A mismatched status is an honest probe failure (hijack guard).
  int32 expected_status = 6;
}

message UrlTestWarmResult {
  string tag = 1;
  int32 delay_ms = 2;        // real RTT in ms; 0 on failure
  string error = 3;          // empty on success
}

message UrlTestConfigWarmResponse {
  // Per-tag verdicts (honest, keyed by outbound tag). Missing tags = not probed.
  repeated UrlTestWarmResult results = 1;
  // true = the WARM INSTANCE could not be brought up (config parse / bind /
  // not-ready / panic) → NONE of the probes ran. The app shows blank for every
  // requested tag ("couldn't test"), NOT a red × ("dead"). A per-tag failure with
  // this false is an honest tested-dead verdict for that one server.
  bool bring_up_failed = 2;
  string error = 3;          // instance-level error text when bring_up_failed
}

// ReleaseWarmProbe tears down a warm probe instance early (e.g. the server-list
// screen closed). No-op if the key is unknown. instance_key "" => release ALL.
message ReleaseWarmProbeRequest {
  string instance_key = 1;
}

message ChangeInhiveSettingsRequest {
  string inhive_settings_json = 1;
}

message GenerateConfigRequest {
  string path = 1;
  string temp_path = 2;
  bool debug = 3;
}

message GenerateConfigResponse {
  string config_content = 1;
}



message SelectOutboundRequest {
  string group_tag = 1;
  string outbound_tag = 2;
}

message UrlTestRequest {
  string tag = 1;
}

// SpeedTestRequest — измеряет throughput через конкретный outbound.
// Используется UI для "Тест скорости" по серверам подписки.
message SpeedTestRequest {
  // Tag outbound'а через который тестируем (например "p-xxx").
  string outbound_tag = 1;
  // Сколько байт скачать/залить (default 2_000_000 = 2MB).
  int64 test_bytes = 2;
  // Тестировать download (false) или upload (true). Default download.
  bool upload = 3;
  // Timeout сек (default 20). Long timeout важен на slow connections.
  int32 timeout_sec = 4;
}

message SpeedTestResponse {
  // Скорость в килобайтах/сек (KB/s). 0 если test failed.
  int64 speed_kbps = 1;
  // Время теста в миллисекундах (для diagnostic).
  int64 elapsed_ms = 2;
  // Сколько байт реально получено/отправлено.
  int64 bytes_transferred = 3;
  // Error message если test failed (empty on success).
  string error = 4;
}

message GenerateWarpConfigRequest {
  string license_key = 1;
  string account_id = 2;
  string access_token = 3;
}

message SetSystemProxyEnabledRequest {
  bool is_enabled = 1;
}

// Phase 2 — generic mode switching (olcrtc Wave 18).
//
// Modes are intentionally typed as int32 (not enum) so additional modes can
// be added without breaking older clients that haven't regenerated stubs.
// Current allocation: 1 = primary (sing-box urltest carousel),
//                     2 = stealth fallback (e.g. olcrtc).
// Core does NOT itself perform a hard switch; on iOS the NE Provider must be
// restarted by the main app with a different providerConfiguration. Core's
// role is twofold: track desired mode + emit recommend-switch events from
// URLTest health.
message SwitchModeRequest {
  // Target mode. 1 or 2 in the current allocation; anything else is rejected
  // by the handler with FAILED. Sent by the main app as a manual override or
  // as the executed-acknowledgement after acting on a recommendation event.
  int32 mode = 1;
}

message ModeStateResponse {
  // The mode that core currently considers "desired". After SwitchMode is
  // accepted this updates immediately; the main app reconciles by
  // restarting NE. Equal to recommended_mode on emergency recommendations.
  int32 current_mode = 1;
  // True for snapshots / acks, false when accompanied by a non-empty error.
  bool success = 2;
  // Non-empty when the event represents a failure (invalid mode, etc.).
  string error = 3;
  // Unix milliseconds — set by core, monotonic across a session.
  int64 timestamp_ms = 4;
  // Best-effort label of the currently routed transport (e.g. an outbound
  // tag or `"olcrtc"` in Mode 2). Empty if not determinable.
  string active_transport = 5;
}

enum LogLevel {
  TRACE = 0; 
  DEBUG = 1;
  INFO = 2;
  WARNING = 3;
  ERROR = 4;
  FATAL = 5;
}
enum LogType {
  CORE = 0;
  SERVICE = 1;
  CONFIG = 2;
}
message LogMessage {
  LogLevel level = 1;
  LogType type = 2;
  string message = 3;
  google.protobuf.Timestamp time = 4;
}

message LogRequest {
  LogLevel level = 1;
}

message StopRequest{
}




