# OSV-Scanner — supply-chain CVE check for Go modules.
#
# Complements dependabot.yml:
#   - Dependabot proposes new versions (weekly Mon 06:00 UTC).
#   - OSV-Scanner flags known CVEs in currently-pinned versions (may be unpatched in latest stable).
#
# Scheduled run fires Mon 04:23 UTC so CVE findings surface BEFORE dependabot opens its PRs.
#
# Action pin discipline (per _actions_pin_summary_2026_05_19.md):
#   Reusable workflow ref pinned to v2.3.8 SHA. Update via Dependabot github-actions group + manual SHA re-pin.
#
# Submodules note: root go.mod uses `replace` for ./sing-box. OSV-Scanner parses go.mod
# directly (no `go list` call graph), so submodule contents aren't required for dep version lookup.
#
# Scope restriction: explicit --lockfile flags instead of --recursive. Reason: --recursive
# picks up `sing-box/replace/tailscale/client/web/yarn.lock` (vendored Tailscale web UI npm deps,
# 30+ npm vulns 2026-05-21). That code is dead — Tailscale web UI is not compiled into our
# DLL/AAR/Framework. Tracked in feedback_security_supply_chain.md as known dead surface.

name: OSV-Scanner

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 04:23 UTC — runs before dependabot @ 06:00.
    - cron: '23 4 * * 1'
  workflow_dispatch:

permissions:
  # Required to upload SARIF to GitHub Security tab.
  security-events: write
  contents: read
  actions: read

jobs:
  scan-scheduled:
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2"  # v2.3.8
    with:
      # Explicit Go lockfiles only — skip submodule/vendored npm/yarn deps (Tailscale web UI).
      scan-args: |-
        --lockfile=go.mod
        --lockfile=xray2sing/go.mod
    permissions:
      security-events: write
      contents: read
      actions: read

  scan-pr:
    if: ${{ github.event_name == 'pull_request' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2"  # v2.3.8
    with:
      scan-args: |-
        --lockfile=go.mod
        --lockfile=xray2sing/go.mod
    permissions:
      security-events: write
      contents: read
      actions: read
