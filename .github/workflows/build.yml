name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Rewrite SSH to HTTPS for submodules
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          # Pinned for consistency with go.mod (per _actions_pin_summary).
          # 1.26.3→1.26.4: clear stdlib CVEs GO-2026-5037/5038/5039.
          # 1.26.4→1.26.5 (2026-07-19): clear GO-2026-5856 (ECH privacy leak in
          # crypto/tls — reachable from our code) + GO-2026-4970 (symlink root
          # escape in os). Держать в одной версии с go.mod: разъезд означает,
          # что CI проверяет не тот тулчейн, которым собирают артефакт.
          go-version: '1.26.5'

      # gofmt-гейт — ТОЛЬКО наш код. Проверка = `make fmt-check`: и список
      # каталогов (FMT_DIRS), и фильтр *.pb.go живут в Makefile ОДИН раз —
      # та же дисциплина, что с BASE_TAGS ниже (список, вписанный в workflow
      # руками, разъедется с Makefile на первом же изменении).
      # Вендоренный sing-box/ в границы НЕ входит намеренно: там 56
      # неотформатированных файлов АПСТРИМА — гейт по ним был бы вечно
      # красным, а переформатирование чужого кода превратит каждый бамп в
      # стену конфликтов. Полное обоснование границ — комментарий к FMT_DIRS
      # в Makefile.
      # Шаг стоит ДО скачивания зависимостей: gofmt в них не нуждается, а
      # падать на форматировании лучше за секунды, не после минут go mod
      # download.
      - name: Check gofmt (our code only)
        run: |
          make fmt-check || {
            echo "::error::gofmt drift в нашем коде — почини локально: cd core && make fmt, и закоммить"
            exit 1
          }

      - name: Download dependencies
        run: go mod download

      # Диагностика, а не проверка — шаг НИКОГДА не роняет сборку.
      # Существует ради одного вопроса: почему ld на раннере говорит
      # «skipping incompatible» про libcronet.a, который локально разбирается
      # как валидный ar с ELF x86-64 внутри. Дважды на этот вопрос отвечали
      # догадкой и дважды неверно, поэтому ответ теперь печатается фактом:
      # что реально лежит по пути, какого размера, и что видит `file` в
      # первом члене архива. Как только причина ясна — чинить линковку и
      # убирать вместе с фильтром MAIN+CRONET.
      - name: Diagnose cronet archive (never fails)
        continue-on-error: true
        run: |
          LIB=$(find "$(go env GOMODCACHE)/github.com/sagernet/cronet-go/lib" \
                  -maxdepth 1 -name 'linux_amd64@*' -type d 2>/dev/null | head -1)
          echo "lib dir: ${LIB:-<НЕ НАЙДЕН>}"
          [ -n "$LIB" ] || exit 0
          ls -la "$LIB"
          for f in "$LIB"/libcronet.a "$LIB"/libcronet.so; do
            [ -e "$f" ] && { echo "--- $f ---"; file "$f"; }
          done
          if [ -f "$LIB/libcronet.a" ]; then
            echo "--- первый ELF-член архива ---"
            ar t "$LIB/libcronet.a" 2>/dev/null | head -3
            M=$(ar t "$LIB/libcronet.a" 2>/dev/null | grep -m1 '\.o$')
            [ -n "$M" ] && { cd /tmp && ar x "$LIB/libcronet.a" "$M" && file "$M"; }
            echo "--- ld видит архив как ---"
            ld -verbose 2>/dev/null | head -2
            readelf -h "$LIB/libcronet.a" 2>&1 | head -12 || true
          fi

      # Один шаг считает и теги, и списки пакетов; дальше шаги их переиспользуют.
      #
      # ТЕГИ читаются ИЗ Makefile (BASE_TAGS), а не дублируются здесь строкой:
      # список, вписанный в workflow руками, разъедется с Makefile на первом же
      # изменении, и CI снова начнёт проверять не то, что собирается.
      # Без -tags `go build` вообще не компилирует код за build-тегами — а это
      # ровно наши протокольные пакеты: protocol/olcrtc (with_olcrtc),
      # protocol/naive (with_naive_outbound), wireguard/awg (with_awg),
      # quic (with_quic). Поломка в любом проходила CI зелёной и всплывала
      # только на сборочной машине или у пользователя.
      #
      # ПАКЕТЫ собираются из ТРЁХ модулей. `./...` покрывает только сам core
      # (17 пакетов). sing-box и xray2sing — ОТДЕЛЬНЫЕ модули, подключённые
      # через replace в go.mod, и в `./...` не попадают вообще. А все наши
      # патчи живут именно в sing-box (~139 пакетов): транспорты, xhttp, dns,
      # libbox, protocol. То есть до этого места они не проверялись ничем.
      # Перечислять их надо по import-path и ИЗ каталога core/ — если зайти в
      # sing-box/, replace-директивы главного модуля не действуют и вылезет
      # ложная ошибка про dnscrypt.
      - name: Resolve tags and packages
        id: ctx
        run: |
          set -euo pipefail
          TAGS=$(sed -n 's/^BASE_TAGS=//p' Makefile | head -1)
          if [ -z "$TAGS" ]; then
            echo "::error::не удалось прочитать BASE_TAGS из Makefile"
            exit 1
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Build tags: $TAGS"

          MODULES='./... github.com/sagernet/sing-box/... github.com/twilgate/xray2sing/...'

          # Наши пакеты, не собираемые в linux-CI по инфраструктурным причинам:
          #   cmd/bydll        — требует предсобранную DLL
          #   platform/desktop — требует CGO-заголовки
          #   profile/test     — тестовые фикстуры
          #
          # ⚠️ Пакетов, падающих на ЛИНКОВКЕ cronet, здесь НЕТ и быть не должно:
          # они отбираются вычисляемым признаком ниже (MAIN+CRONET), а не именем.
          # Ручной список этот класс уже дважды пропускал — сначала cmd/main и
          # xray2sing/cmd, потом tun_bench и корень модуля xray2sing. Каждый
          # промах = красная сборка и письмо. Признак «главный пакет + cronet в
          # дереве зависимостей» ловит их все и переживёт появление новых.
          EXCL='(inhive-core/cmd/bydll|inhive-core/platform/desktop|inhive-core/v2/profile/test)'

          # Апстримные пакеты sing-box, которых нет в НАШЕМ графе модулей (их
          # зависимостей нет в go.sum, потому что мы их не собираем и не
          # поставляем). Не «сломаны» — просто не наши:
          #   cmd/sing-box                       — самостоятельный CLI апстрима
          #                                        (мы поставляем DLL + свой cmd/)
          #   cmd/internal/app_store_connect     — релизная обвязка Apple
          #   cmd/internal/update_apple_version  — то же
          #   common/geoip                       — maxminddb, geoip-БД не используем
          #   protocol/psiphon                   — psiphon-tunnel-core, не в тегах
          EXCL="$EXCL|(sing-box/cmd/sing-box|sing-box/cmd/internal/app_store_connect|sing-box/cmd/internal/update_apple_version|sing-box/common/geoip|sing-box/protocol/psiphon)"

          # ⚠️ ИЗВЕСТНАЯ ПОЛОМКА, НЕ инфраструктурная — sing-box/protocol/tailscale
          # и его единственный импортёр sing-box/service/derp (DERP-релей, мы его
          # не поставляем). Исключать надо ОБА: пакет тянется транзитивно, и
          # выкидывание только tailscale из списка не спасает — derp утащит его
          # в сборку снова.
          #
          # Суть: protocol/tailscale/endpoint.go:349,351,487 зовёт
          # netns.SetControlFunc, которого нет в нашем вендоренном форке
          # (sing-box/replace/tailscale/net/netns — там есть SetAndroidProtectFunc,
          # SetControlFunc отсутствует). Это version skew вендоренного
          # github.com/sagernet/tailscale относительно кода sing-box 1.13.x.
          # Файл гейтится //go:build with_gvisor, а with_gvisor у нас включён,
          # поэтому пакет попадает в сборку. На АРТЕФАКТЫ не влияет: проверено,
          # что ни tailscale, ни derp не входят в дерево зависимостей
          # ./platform/desktop (with_tailscale в BASE_TAGS нет, никто их не
          # импортирует). Исключены ЯВНО и по именам, чтобы не прятать проблему
          # за автофильтром: чинится бампом вендоренного форка, владелец —
          # реестр core/upstream.toml. Убрать эту строку сразу после починки.
          EXCL="$EXCL|(sing-box/protocol/tailscale|sing-box/service/derp)"

          # -e обязателен: без него `go list` САМ падает на исключённых выше
          # пакетах (нерезолвящийся импорт — фатальная ошибка) ещё до того, как
          # grep успеет их отфильтровать. С -e ошибка становится полем записи.
          #
          # Но -e один в один прячет и НАСТОЯЩУЮ поломку, поэтому ниже стоит
          # assert: любой пакет с ошибкой, не внесённый в EXCL явно, роняет шаг.
          # Так исключения остаются явным списком из шести имён с объяснениями,
          # а не безымянным «пропускаем всё, что не собралось».
          #
          # HASGO/{{if .GoFiles}} отсеивает пакеты, где лежат ТОЛЬКО _test.go
          # (например hygiene/ с fitness-тестами): для них `go build` — ошибка
          # "no non-test Go files" и шаг падает целиком. Фильтр вычисляемый, а
          # не очередное имя в grep: иначе каждый новый тест-онли пакет будет
          # ронять CI и его снова придётся чинить руками. go vet такие пакеты
          # обрабатывает штатно, поэтому в vet-список они входят.
          # Пятое поле — ВЫЧИСЛЯЕМЫЙ признак линковки cronet: `MAIN+CRONET`
          # означает «главный пакет, который линкуется, и cronet у него в дереве
          # зависимостей». Такие пропускаются на шаге build.
          #
          # Почему вообще пропускаются: на раннере GNU ld отвергал libcronet.a
          # («skipping incompatible»). ОБЕ прежние формулировки в этом файле были
          # неверны — «статического среза для linux не существует» и «архив
          # несовместим». Диагностический шаг выше отработал 2026-07-19 и снял
          # вопрос о файле, замеры С САМОГО РАННЕРА:
          #   libcronet.a  — 55513278 б, `current ar archive`
          #   члены        — ELF 64-bit LSB relocatable, x86-64 (SYSV), REL
          #   линкер       — GNU ld (GNU Binutils for Ubuntu) 2.42
          # То есть архив валиден и точно соответствует цели сборки. Почему ld
          # всё же считал его несовместимым — НЕ УСТАНОВЛЕНО. Это единственный
          # оставшийся неизвестный; всё вокруг него теперь измерено, так что
          # следующий заход начинается не с нуля. До разгадки пропускается
          # только ЛИНКОВКА трёх main-пакетов, которые мы не поставляем.
          #
          # Что при этом НЕ теряется: библиотечные пакеты не линкуются вовсе, их
          # компиляция проверяется целиком — включая protocol/naive и
          # protocol/naive/quic с полным набором тегов. go vet тоже не линкует,
          # поэтому vet-список остаётся полным.
          go list -e -tags "$TAGS" -f '{{.ImportPath}} {{if or .Error .DepsErrors}}BROKEN{{else}}OK{{end}} {{if .GoFiles}}HASGO{{else}}NOGO{{end}} {{if or .TestGoFiles .XTestGoFiles}}HASTEST{{else}}NOTEST{{end}} {{if eq .Name "main"}}MAIN{{else}}LIB{{end}}{{range .Deps}}{{if eq . "github.com/sagernet/cronet-go"}}+CRONET{{end}}{{end}}' \
            $MODULES 2>/dev/null > /tmp/all.txt
          grep -v -E "$EXCL" /tmp/all.txt > /tmp/kept.txt

          if grep -q ' BROKEN ' /tmp/kept.txt; then
            echo "::error::пакеты не резолвятся и не внесены в список исключений:"
            grep ' BROKEN ' /tmp/kept.txt
            exit 1
          fi

          awk '$2=="OK" && $3=="HASGO" && $5!="MAIN+CRONET" {print $1}' /tmp/kept.txt > /tmp/pkgs-build.txt
          awk '$2=="OK"                                     {print $1}' /tmp/kept.txt > /tmp/pkgs-vet.txt

          # Тесты гоняются БЕЗ with_naive_outbound — по той же причине линковки:
          # тест собирается в исполняемый бинарь, поэтому ЛЮБОЙ пакет с cronet в
          # зависимостях упал бы так же, как main. С полным набором тегов из
          # прогона выпали бы libbox, v2/config, v2/hcore и — самое ценное —
          # xray2sing/ray2sing, корпус-гард парсера. Без одного этого тега cronet
          # не попадает в зависимости НИ ОДНОГО тестового пакета (проверено
          # go list по всем трём модулям), и прогон остаётся полным. Компиляция
          # самого naive проверена шагами build/vet выше, так что тег не теряется
          # из проверки — он теряется только из линковки тестовых бинарей.
          TAGS_TEST=$(echo "$TAGS" | sed 's/,with_naive_outbound//; s/with_naive_outbound,//')
          echo "tags_test=$TAGS_TEST" >> "$GITHUB_OUTPUT"
          go list -e -tags "$TAGS_TEST" -f '{{.ImportPath}} {{if or .Error .DepsErrors}}BROKEN{{else}}OK{{end}} {{if or .TestGoFiles .XTestGoFiles}}HASTEST{{else}}NOTEST{{end}}' \
            $MODULES 2>/dev/null | grep -v -E "$EXCL" \
            | awk '$2=="OK" && $3=="HASTEST" {print $1}' > /tmp/pkgs-test.txt

          echo "build: $(wc -l < /tmp/pkgs-build.txt), vet: $(wc -l < /tmp/pkgs-vet.txt), test: $(wc -l < /tmp/pkgs-test.txt)"
          echo "--- пропущено на линковке (cronet) ---"
          awk '$5=="MAIN+CRONET" {print "  " $1}' /tmp/kept.txt

      - name: Verify build
        run: go build -tags "${{ steps.ctx.outputs.tags }}" $(cat /tmp/pkgs-build.txt)

      - name: Run vet
        run: go vet -tags "${{ steps.ctx.outputs.tags }}" $(cat /tmp/pkgs-vet.txt)

      # Тесты в модулях sing-box/xray2sing до этого не запускались НИ РАЗУ —
      # они лежали вне `./...`. Теги обязательны: без них часть падает не по
      # существу, а на заглушках (например transport/v2rayxhttp без with_utls:
      # "uTLS ... is not included in this build"). Набор тегов здесь свой —
      # tags_test, полный минус with_naive_outbound; почему — см. шаг ctx.
      #
      # ⚠️ Зелёный прогон этого шага пока НЕ наблюдался: до сих пор сборка
      # падала раньше, на шаге build, и до тестов очередь не доходила. Первый
      # прогон, дошедший сюда, и будет первым фактическим запуском.
      - name: Run tests
        run: go test -tags "${{ steps.ctx.outputs.tags_test }}" -count=1 -timeout 10m $(cat /tmp/pkgs-test.txt)
