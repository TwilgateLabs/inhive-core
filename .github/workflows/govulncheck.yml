# govulncheck — Go-specific vuln scan with call-graph reachability analysis.
#
# Complements osv-scanner.yml:
#   - OSV-Scanner flags any CVE in declared deps (lockfile-level).
#   - govulncheck only fails on vulns actually REACHABLE from main() via static analysis.
#
# Why both: OSV catches everything (lower false-neg, higher noise); govulncheck
# tells which findings actually matter for our binary's attack surface.
#
# Schedule offset Mon 04:37 UTC (vs OSV @ 04:23) — separate alerts, no concurrent log noise.
#
# Action pin discipline (per _actions_pin_summary_2026_05_19.md):
#   - actions/checkout@v4.3.1 — same SHA as build.yml
#   - actions/setup-go@v5.6.0 — same SHA as build.yml
#   - govulncheck installed via `go install golang.org/x/vuln/cmd/govulncheck@v1.1.4` (pinned tag)

name: govulncheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Rewrite SSH to HTTPS for submodules
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          # Держать в одной версии с go.mod и build.yml. 1.26.4→1.26.5
          # (2026-07-19) закрывает GO-2026-5856 (ECH privacy leak в crypto/tls,
          # была ДОСТИЖИМА — 8 трасс) и GO-2026-4970 (symlink root escape в os).
          # Именно на них джоба краснела на каждый push.
          go-version: '1.26.5'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Download dependencies
        run: go mod download

      # Тот же охват, что в build.yml, и по той же причине: `go list ./...`
      # видит только 17 пакетов самого core. Модули sing-box и xray2sing
      # подключены через replace и в `./...` НЕ попадают — а весь сетевой код
      # (транспорты, TLS, DNS, протоколы) живёт именно в sing-box. Сканировать
      # уязвимости, пропуская его, — это проверять периметр, не заглядывая
      # внутрь.
      #
      # -tags обязателен: без тегов код за build-тегами не компилируется, а
      # значит не попадает и в call-граф govulncheck — достижимые уязвимости в
      # naive/olcrtc/awg/quic просто не были бы найдены.
      #
      # Исключения — те же, что в build.yml (см. подробные обоснования там):
      # инфраструктурно несобираемые в linux-CI + апстримные пакеты не из
      # нашего графа + известная поломка tailscale/derp.
      - name: Run govulncheck
        run: |
          set -euo pipefail
          TAGS=$(sed -n 's/^BASE_TAGS=//p' Makefile | head -1)
          if [ -z "$TAGS" ]; then
            echo "::error::не удалось прочитать BASE_TAGS из Makefile"
            exit 1
          fi
          MODULES='./... github.com/sagernet/sing-box/... github.com/twilgate/xray2sing/...'
          EXCL='(inhive-core/cmd/bydll|inhive-core/platform/desktop|inhive-core/v2/profile/test)'
          EXCL="$EXCL|(sing-box/cmd/sing-box|sing-box/cmd/internal/app_store_connect|sing-box/cmd/internal/update_apple_version|sing-box/common/geoip|sing-box/protocol/psiphon)"
          EXCL="$EXCL|(sing-box/protocol/tailscale|sing-box/service/derp)"

          PKGS=$(go list -e -tags "$TAGS" -f '{{if and .GoFiles (not (or .Error .DepsErrors))}}{{.ImportPath}}{{end}}' \
            $MODULES 2>/dev/null | grep -v -E "$EXCL")
          echo "scanning $(echo "$PKGS" | wc -l) packages with tags: $TAGS"
          govulncheck -tags "$TAGS" $PKGS
